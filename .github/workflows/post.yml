name: AFDER — Carrousel & Reels Instagram

on:
  schedule:
    - cron: '42 9 * * *'      # Carrousel — tous les jours 9h42 UTC
    - cron: '0 12 * * 1,3,5'  # Reels — lun/mer/ven 12h00 UTC
  workflow_dispatch:

jobs:

  # ── CARROUSEL : tous les jours ──────────────────────────────────────────────
  carrousel:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '42 9 * * *'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-open-sans libcairo2-dev libffi-dev pkg-config

      - name: Python dependencies
        run: |
          pip install groq requests Pillow cloudinary cryptography pynacl cairosvg together

      - name: Publier le carrousel
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY:       ${{ secrets.TOGETHER_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
        run: python post.py

  # ── REELS : lundi, mercredi, vendredi ───────────────────────────────────────
  reels:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 12 * * 1,3,5'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-open-sans fonts-noto-color-emoji ffmpeg

      - name: Python dependencies
        run: |
          pip install requests Pillow cloudinary "moviepy==1.0.3" numpy google-genai

      - name: Publier le Reel
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
        run: python post_reels_afder.py
